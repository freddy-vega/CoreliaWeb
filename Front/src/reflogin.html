<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Manager — Iniciar Sesión</title>
    <meta name="description" content="Inicia sesión para gestionar tus cuentas de WhatsApp">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <!-- Logo -->
            <div class="login-logo">
                <div class="login-logo-icon">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.5">
                        <path
                            d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" />
                    </svg>
                </div>
                <h1>WhatsApp Manager</h1>
                <p class="login-subtitle">Gestiona múltiples cuentas desde un solo lugar</p>
            </div>

            <!-- LOGIN FORM -->
            <form id="loginForm" class="auth-form active" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="loginUser">Usuario</label>
                    <input type="text" id="loginUser" placeholder="Tu nombre de usuario" required
                        autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="loginPass">Contraseña</label>
                    <input type="password" id="loginPass" placeholder="Tu contraseña" required
                        autocomplete="current-password">
                </div>
                <button type="submit" class="btn-login" id="btnLogin">
                    <span>Iniciar Sesión</span>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14" />
                        <path d="m12 5 7 7-7 7" />
                    </svg>
                </button>
                <div class="auth-toggle">
                    ¿No tienes cuenta? <a href="#" onclick="toggleAuth(event)">Regístrate</a>
                </div>
            </form>

            <!-- REGISTER FORM -->
            <form id="registerForm" class="auth-form" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label for="regUser">Usuario</label>
                    <input type="text" id="regUser" placeholder="Elige un nombre de usuario" required minlength="3"
                        autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="regPass">Contraseña</label>
                    <input type="password" id="regPass" placeholder="Mínimo 4 caracteres" required minlength="4"
                        autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label for="regPassConfirm">Confirmar Contraseña</label>
                    <input type="password" id="regPassConfirm" placeholder="Repite la contraseña" required
                        autocomplete="new-password">
                </div>
                <button type="submit" class="btn-login btn-register">
                    <span>Crear Cuenta</span>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                        <circle cx="9" cy="7" r="4" />
                        <line x1="19" y1="8" x2="19" y2="14" />
                        <line x1="22" y1="11" x2="16" y2="11" />
                    </svg>
                </button>
                <div class="auth-toggle">
                    ¿Ya tienes cuenta? <a href="#" onclick="toggleAuth(event)">Inicia sesión</a>
                </div>
            </form>

            <div id="authError" class="auth-error"></div>
        </div>

        <!-- Decorative background elements -->
        <div class="login-bg-circle c1"></div>
        <div class="login-bg-circle c2"></div>
        <div class="login-bg-circle c3"></div>
    </div>

    <script>
        // Si ya tiene token válido, redirigir al dashboard
        const token = localStorage.getItem('wa_token');
        if (token) {
            fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + token } })
                .then(r => { if (r.ok) window.location.href = '/'; })
                .catch(() => { });
        }

        function toggleAuth(e) {
            e.preventDefault();
            document.getElementById('loginForm').classList.toggle('active');
            document.getElementById('registerForm').classList.toggle('active');
            document.getElementById('authError').textContent = '';
        }

        function showError(msg) {
            const el = document.getElementById('authError');
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 5000);
        }

        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('loginUser').value.trim();
            const password = document.getElementById('loginPass').value;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (data.error) { showError(data.error); return; }
                localStorage.setItem('wa_token', data.token);
                localStorage.setItem('wa_user', JSON.stringify(data.user));
                window.location.href = '/';
            } catch (err) {
                showError('Error de conexión');
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const username = document.getElementById('regUser').value.trim();
            const password = document.getElementById('regPass').value;
            const confirm = document.getElementById('regPassConfirm').value;

            if (password !== confirm) { showError('Las contraseñas no coinciden'); return; }

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (data.error) { showError(data.error); return; }
                localStorage.setItem('wa_token', data.token);
                localStorage.setItem('wa_user', JSON.stringify(data.user));
                window.location.href = '/';
            } catch (err) {
                showError('Error de conexión');
            }
        }
    </script>
</body>

</html>
